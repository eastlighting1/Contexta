name: Test Matrix

# Runs the full test suite across all supported Python versions.
# Add new versions here when Python releases them (e.g. "3.15" in Oct 2026).
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run nightly on main to catch upstream regressions early.
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run test suite
        run: uv run pytest --tb=short -q
