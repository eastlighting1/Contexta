name: Packaging

# Verifies that the package builds cleanly and installs correctly from the wheel.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.14"

      - name: Build distributions
        run: uv build

      - name: Check wheel contents
        run: |
          uv run python -c "
          import zipfile, pathlib
          whl = next(pathlib.Path('dist').glob('*.whl'))
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          tops = set(n.split('/')[0] for n in names)
          # Wheel filename: {name}-{version}-{python}-{abi}-{platform}.whl
          # dist-info inside: {name}-{version}.dist-info  (first two components only)
          dist_info = '-'.join(whl.stem.split('-')[:2]) + '.dist-info'
          unexpected = [t for t in tops if t not in ('contexta', dist_info)]
          assert not unexpected, f'Unexpected top-level in wheel: {unexpected}'
          print(f'wheel OK: {whl.name} ({len(names)} files, top-level clean)')
          "

      - name: Check sdist contents
        run: |
          uv run python -c "
          import tarfile, pathlib
          sdist = next(pathlib.Path('dist').glob('*.tar.gz'))
          with tarfile.open(sdist) as t:
              names = t.getnames()
          tops = set(n.split('/')[1] if '/' in n else n for n in names)
          internal = {'.claude', '.codex-meeting', 'Brain.md', 'uv.lock'}
          leaked = internal & tops
          assert not leaked, f'Internal files leaked into sdist: {leaked}'
          print(f'sdist OK: {sdist.name} ({len(names)} entries, no internal leaks)')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  install-from-wheel:
    name: Install from wheel + smoke
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.14"

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel into clean venv
        run: |
          uv venv /tmp/ctx-wheel-smoke
          uv pip install --python /tmp/ctx-wheel-smoke/bin/python dist/*.whl --quiet

      - name: Import smoke (from wheel)
        run: |
          /tmp/ctx-wheel-smoke/bin/python -c "
          from contexta import Contexta, ContextaError, __version__
          from contexta.config import UnifiedConfig
          from contexta.contract import Run, ArtifactManifest
          from contexta.capture import EventEmission, MetricEmission
          from contexta.store.metadata import MetadataStore
          from contexta.interpretation import QueryService
          from contexta.recovery import create_workspace_backup
          print('wheel install smoke: OK', __version__)
          "

      - name: CLI smoke (from wheel)
        run: /tmp/ctx-wheel-smoke/bin/contexta --help
